<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        :root {
            color-scheme: light;
            font-family: "Avenir Next", "Segoe UI", sans-serif;
        }

        body {
            width: 320px;
            margin: 0;
            padding: 16px;
            background: linear-gradient(180deg, #f7f4ea 0%, #ffffff 100%);
            color: #1f2933;
        }

        .card {
            display: grid;
            gap: 12px;
            padding: 14px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 12px 30px rgba(31, 41, 51, 0.10);
        }

        .eyebrow {
            font-size: 11px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #7b8794;
        }

        .page-title {
            font-size: 16px;
            font-weight: 700;
            line-height: 1.3;
        }

        .page-url {
            font-size: 12px;
            color: #52606d;
            word-break: break-word;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            border-radius: 12px;
            background: #f0f4f8;
        }

        .status-label {
            font-size: 12px;
            color: #52606d;
        }

        .timer {
            font-variant-numeric: tabular-nums;
            font-size: 24px;
            font-weight: 700;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            border: 0;
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        button:disabled {
            cursor: default;
            opacity: 0.6;
        }

        #record {
            background: #126782;
            color: #fff;
        }

        #cancel {
            background: #d9e2ec;
            color: #243b53;
        }

        .result-card {
            display: grid;
            gap: 8px;
            padding: 12px;
            border-radius: 12px;
            background: #fff8e1;
        }

        .result-card.empty {
            background: #f0f4f8;
        }

        .result-headline {
            font-size: 18px;
            font-weight: 700;
        }

        .result-meta {
            font-size: 12px;
            color: #52606d;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="eyebrow">Current Page</div>
        <div id="page-title" class="page-title">Loading...</div>
        <div id="page-url" class="page-url"></div>

        <div class="status-row">
            <div>
                <div class="status-label" id="status-label">Ready to record</div>
            </div>
            <div id="timer" class="timer">00:30</div>
        </div>

        <div class="actions">
            <button id="record">Record Tab</button>
            <button id="cancel" disabled>Cancel</button>
        </div>

        <div id="result-card" class="result-card empty">
            <div class="eyebrow">Saved Result</div>
            <div id="result" class="result-headline">No saved result for this page</div>
            <div id="score" class="result-meta"></div>
            <div id="updated-at" class="result-meta"></div>
        </div>
    </div>

    <script src="shared.js"></script>
    <script src="popup.js"></script>
</body>
</html>
